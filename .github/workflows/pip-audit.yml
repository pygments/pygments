name: 🔒 Dependency vulnerability scan

# Scan Python dependencies for known vulnerabilities using pip-audit.
# Runs weekly on Mondays at 8:00 UTC and on every push to main.

on:
  schedule:
    - cron: "0 8 * * 1"
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pip-audit:
    name: Dependency vulnerability scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
      - name: Install project
        run: uv pip install --system ".[windows-terminal]"
      - name: Run pip-audit
        run: uvx pip-audit@2.10.0
